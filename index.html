<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ساعت جهانی ارمیا</title>

<style>
body{
font-family:tahoma;
margin:0;
background:#f4f4f4;
transition:.3s;
}

.dark{
background:#111827;
color:white;
}

header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.search{
text-align:center;
padding:15px;
}

input{
padding:12px;
width:80%;
max-width:400px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.dark .card{
background:#1f2937;
}

.city{
font-size:22px;
font-weight:bold;
}

.time{
font-size:30px;
margin-top:10px;
color:#2563eb;
}

.dark .time{
color:#60a5fa;
}
</style>
</head>
  <script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>
<body>

<header>
<h1>🌍 ساعت جهانی ارمیا</h1>
<p id="date"></p>

<button onclick="toggleTheme()">
🌙 شب / روز
</button>
</header>

<div class="search">
<input
id="search"
placeholder="جستجوی شهر..."
onkeyup="render()">
</div>

<div class="grid" id="grid"></div>

<script>

const cities=[

{name:"تهران",flag:"🇮🇷",tz:"Asia/Tehran"},
{name:"بغداد",flag:"🇮🇶",tz:"Asia/Baghdad"},
{name:"مکه",flag:"🇸🇦",tz:"Asia/Riyadh"},
{name:"دبی",flag:"🇦🇪",tz:"Asia/Dubai"},
{name:"لندن",flag:"🇬🇧",tz:"Europe/London"},
{name:"پاریس",flag:"🇫🇷",tz:"Europe/Paris"},
{name:"برلین",flag:"🇩🇪",tz:"Europe/Berlin"},
{name:"مسکو",flag:"🇷🇺",tz:"Europe/Moscow"},
{name:"توکیو",flag:"🇯🇵",tz:"Asia/Tokyo"},
{name:"پکن",flag:"🇨🇳",tz:"Asia/Shanghai"},
{name:"نیویورک",flag:"🇺🇸",tz:"America/New_York"},
{name:"لس‌آنجلس",flag:"🇺🇸",tz:"America/Los_Angeles"},
{name:"تورنتو",flag:"🇨🇦",tz:"America/Toronto"},
{name:"استانبول",flag:"🇹🇷",tz:"Europe/Istanbul"}

];

function getTime(zone){

return new Date()
.toLocaleTimeString(
"fa-IR",
{
timeZone:zone
});

}

function render(){

const text=
document.getElementById("search")
.value;

const grid=
document.getElementById("grid");

grid.innerHTML="";

cities
.filter(c=>c.name.includes(text))
.forEach(c=>{

grid.innerHTML+=`

<div class="card">

<div class="city">
${c.flag} ${c.name}
</div>

<div class="time">
${getTime(c.tz)}
</div>

</div>

`;

});

}

function updateDate(){

document.getElementById("date")
.innerHTML=

new Date()
.toLocaleDateString("fa-IR",
{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
});

}

function toggleTheme(){

document.body.classList.toggle("dark");

localStorage.setItem(
"theme",
document.body.classList.contains("dark")
);

}

if(localStorage.getItem("theme")==="true"){

document.body.classList.add("dark");

}

setInterval(render,1000);

updateDate();

render();

</script>

</body>
</html>
